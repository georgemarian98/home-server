---

- name: Synchronize docker volumes
  hosts:
    - pi
    - homelab

  vars:
    docker_sync_destination: "{{ PI_DOCKER_CONFIG_VOLUME_DESTINATION_PATH if 'pi' in group_names else DEBIAN_DOCKER_CONFIG_VOLUME_DESTINATION_PATH }}"
    rsync_exclude: "{{ '--exclude=jellyfin/' if 'homelab' in group_names else '' }}"

  tasks:
    - name: Stop all containers
      shell: |
        {% raw %}
        docker stop $(docker ps -a --format="{{.Names}}")
        {% endraw %}

    - name: Sync directory
      become: yes
      shell: |
        sudo rsync -aAXv --delete {{ rsync_exclude }} {{ DOCKER_CONFIG_VOLUME_PATH }} {{ docker_sync_destination }}

    - name: Start all containers
      shell: |
        {% raw %}
        docker start $(docker ps -a --format="{{.Names}}")
        {% endraw %}

- name: Backup servers
  hosts: homelab

  tasks:
    - set_fact:
        immich_dump_path: "{{ BACKUP_SOURCE_PATH }}/immich/immich-db-backup-{{ '%Y-%m-%d-%H-%M-%S' | strftime }}-v2.5.6-pg14.19_db_dump.sql.gz"

    - name: Create SQL dump of immich database
      shell: docker exec immich_postgres pg_dump -U postgres immich | gzip > {{ immich_dump_path }}

    - name: Backup and prune restic repositories
      become: yes
      shell: |
        restic backup {{ BACKUP_SOURCE_PATH }} --exclude="entertainment" --exclude="immich/postgres" --tag auto_backup --verbose=2
        restic forget --prune --keep-daily 7 --keep-weekly 4 --keep-monthly 6
        restic check
      environment:
        RESTIC_REPOSITORY: "{{ item.repo }}"
        RESTIC_PASSWORD: "{{ item.password }}"
      loop:  "{{ RESTIC_REPOSITORIES }}"

    - name: Delete SQL dump file
      file:
        path: "{{ immich_dump_path }}"
        state: absent
  
- name: Post-backup tasks
  hosts: homelab
  
  tasks:
    - set_fact:
        backup_log_path: "~/backup_log_{{ '%Y_%m_%d' | strftime }}.txt"

    - name: Create backup log
      shell: restic snapshots --json --latest 2 | jq -r '.[].short_id' | xargs restic diff > {{ backup_log_path }}
      environment:
        RESTIC_REPOSITORY: "{{ RESTIC_REPOSITORIES[0].repo }}"
        RESTIC_PASSWORD: "{{ RESTIC_REPOSITORIES[0].password }}"

    - name: Send backup log to pi
      shell: scp {{ backup_log_path }} {{ PI_SSH_HOST }}:~/backup_share/logs

    - name: Delete original backup log
      file:
        path: "{{ backup_log_path }}"
        state: absent

    
