---

services:
  hawser :
    image: ghcr.io/finsys/hawser:latest
    container_name: hawser 
    restart: unless-stopped
    pull_policy: always
    # Port will be accesible via the internal network, so no need to expose it here
    # ports:
    #   - 2376:2376
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/hawser-stacks:/opt/hawser-stacks
    environment:
      - STACKS_DIR=/opt/hawser-stacks
      - TOKEN=<INTERNAL_TOKEN> # Change this to a secure token from dockhand
    networks:
      - frontend-swarm

networks:
  frontend-swarm:
    external: true
