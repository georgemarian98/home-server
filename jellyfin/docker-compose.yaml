
services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    volumes:
      - ${CONFIG_PATH}/jellyfin/config:/config
      - ${CONFIG_PATH}/jellyfin/cache:/cache
      - ${ENTERTAINMENT_DIR}/media:/media
    # Port will be proxied, so no need to expose it here
    # ports:
    #   - 8096:8096 
    networks:
      - frontend-swarm
    labels:
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.rlgland.site`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

networks:
  frontend-swarm:
    external: true